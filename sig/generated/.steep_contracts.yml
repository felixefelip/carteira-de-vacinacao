---
version: 1
methods:
  Caderneta::RecomendacaoVacina#dose_recomendada_atual:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: vacina
        chain:
        - dose_do_calendarios
    enforced: false
  Caderneta::RecomendacaoVacina#intervalo_para_proxima_dose_termina_em:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: vacina
        chain:
        - dias_de_intervalo
    enforced: false
  Caderneta::RecomendacaoVacina#user_idade:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: user
    enforced: false
